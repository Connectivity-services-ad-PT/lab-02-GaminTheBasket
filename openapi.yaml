openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion API (Group A1)
  version: 1.0.0
  description: |
    Hợp đồng API cho dịch vụ IoT Ingestion. Cung cấp tính năng thu thập dữ liệu đo đạc,
    xem chi tiết dữ liệu và nhận các sự kiện trạng thái từ thiết bị.
  contact:
    name: Nhóm A1 - Nguyễn Tuấn Anh
    email: student@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: health
    description: Kiểm tra trạng thái service
  - name: telemetry
    description: Quản lý dữ liệu cảm biến
  - name: events
    description: Quản lý sự kiện thiết bị
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiểm tra trạng thái
      description: Kiểm tra xem Ingestion Service có đang hoạt động bình thường không.
      tags: [health]
      security: []
      responses:
        '200':
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: iot-ingestion-a1
                    time: '2026-05-28T08:00:00Z'

  /api/v1/telemetry:
    post:
      operationId: ingestTelemetry
      summary: Tiếp nhận dữ liệu IoT
      description: Endpoint cho phép các thiết bị IoT gửi dữ liệu đo đạc lên hệ thống.
      tags: [telemetry]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryPayload'
            examples:
              valid:
                value:
                  device_id: SENSOR_A201_01
                  timestamp: '2026-05-28T09:30:00Z'
                  readings:
                    temperature: 26.5
                    humidity: 65.2
      responses:
        '201':
          description: Dữ liệu đã được ghi nhận thành công
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status, reading_id]
                properties:
                  status:
                    type: string
                    example: success
                  reading_id:
                    type: string
                    format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      operationId: getTelemetryHistory
      summary: Lấy lịch sử dữ liệu
      description: Trả về danh sách dữ liệu thô phục vụ cho Analytics.
      tags: [telemetry]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Danh sách dữ liệu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryPage'
              examples:
                firstPage:
                  value:
                    items:
                      - reading_id: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                        device_id: SENSOR_A201_01
                        timestamp: '2026-05-28T09:30:00Z'
                        readings:
                          temperature: 26.5
                        received_at: '2026-05-28T09:30:02Z'
                    nextCursor: "eyJvZmZzZXQiOjEwMH0="
                    hasMore: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/telemetry/{reading_id}:
    get:
      operationId: getTelemetryById
      summary: Lấy chi tiết 1 bản ghi đo đạc
      description: Trả về chi tiết dữ liệu cảm biến dựa trên ID giao dịch.
      tags: [telemetry]
      parameters:
        - name: reading_id
          in: path
          required: true
          description: UUID của bản ghi đo đạc
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiết bản ghi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/device-events:
    post:
      operationId: createDeviceEvent
      summary: Ghi nhận sự kiện trạng thái thiết bị
      description: Nhận cảnh báo (Online/Fault) từ thiết bị.
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceEvent'
            examples:
              faultEvent:
                value:
                  eventType: DEVICE_FAULT
                  device_id: SENSOR_A201_01
                  errorCode: ERR_SENSOR_BROKEN
      responses:
        '201':
          description: Đã ghi nhận sự kiện
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status]
                properties:
                  status:
                    type: string
                    example: event_accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor phân trang
      schema:
        type: ["string", "null"]
        minLength: 1
        maxLength: 200
    Limit:
      name: limit
      in: query
      required: false
      description: Số lượng bản ghi trên một trang
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
        time:
          type: string
          format: date-time

    TelemetryPayload:
      type: object
      additionalProperties: false
      required: [device_id, timestamp, readings]
      properties:
        device_id:
          type: string
          minLength: 3
          maxLength: 50
        timestamp:
          type: string
          format: date-time
        readings:
          type: object
          additionalProperties:
            type: number

    TelemetryRecord:
      type: object
      additionalProperties: false
      required: [reading_id, device_id, timestamp, readings, received_at]
      properties:
        reading_id:
          type: string
          format: uuid
        device_id:
          type: string
          minLength: 3
          maxLength: 50
        timestamp:
          type: string
          format: date-time
        readings:
          type: object
          additionalProperties:
            type: number
        received_at:
          type: string
          format: date-time

    TelemetryPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, hasMore]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TelemetryRecord'
        nextCursor:
          type: ["string", "null"]
        hasMore:
          type: boolean

    DeviceEvent:
      type: object
      discriminator:
        propertyName: eventType
        mapping:
          DEVICE_ONLINE: '#/components/schemas/DeviceOnlineEvent'
          DEVICE_FAULT: '#/components/schemas/DeviceFaultEvent'
      oneOf:
        - $ref: '#/components/schemas/DeviceOnlineEvent'
        - $ref: '#/components/schemas/DeviceFaultEvent'

    DeviceOnlineEvent:
      type: object
      additionalProperties: false
      required: [eventType, device_id, ip_address]
      properties:
        eventType:
          type: string
          enum: [DEVICE_ONLINE]
        device_id:
          type: string
          minLength: 3
          maxLength: 50
        ip_address:
          type: string
          format: ipv4

    DeviceFaultEvent:
      type: object
      additionalProperties: false
      required: [eventType, device_id, errorCode]
      properties:
        eventType:
          type: string
          enum: [DEVICE_FAULT]
        device_id:
          type: string
          minLength: 3
          maxLength: 50
        errorCode:
          type: string
          minLength: 2
          maxLength: 50

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: ["string", "null"]
        instance:
          type: ["string", "null"]
        errors:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Dữ liệu không hợp lệ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Dữ liệu không hợp lệ
            status: 400
            detail: Payload không hợp lệ
            instance: /api/v1/telemetry
            errors: []
    Unauthorized:
      description: Thiếu xác thực
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Không tìm thấy tài nguyên
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'